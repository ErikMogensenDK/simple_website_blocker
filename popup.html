<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 500px;
      background: #f5f5f5;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
    }
    .content {
      padding: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="number"],
    input[type="time"],
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #764ba2;
    }
    .rules-list {
      background: white;
      border-radius: 8px;
      margin-top: 16px;
      max-height: 300px;
      overflow-y: auto;
    }
    .rule-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .rule-item:last-child {
      border-bottom: none;
    }
    .rule-info {
      flex: 1;
    }
    .rule-pattern {
      font-weight: 600;
      color: #333;
    }
    .rule-detail {
      color: #999;
      font-size: 12px;
      margin-top: 4px;
    }
    .rule-actions {
      display: flex;
      gap: 8px;
    }
    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #333;
      border: none;
      cursor: pointer;
    }
    .btn-small:hover {
      background: #e0e0e0;
    }
    .btn-delete {
      background: #ff6b6b;
      color: white;
    }
    .btn-delete:hover {
      background: #ff5252;
    }
    .checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>Simple Site Blocker</header>
  <div class="content">
    <div class="form-group">
      <label for="pattern">Website Pattern</label>
      <input type="text" id="pattern" placeholder="e.g., *reddit.com*, *twitter.com*">
    </div>

    <div class="form-group">
      <label for="blockType">Block Type</label>
      <select id="blockType">
        <option value="time">Time-based (blocked during hours)</option>
        <option value="daily">Daily Limit (max visits per day)</option>
      </select>
    </div>

    <div id="timeOptions" class="form-row" style="display: none;">
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" value="09:00">
      </div>
      <div class="form-group">
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" value="17:00">
      </div>
    </div>

    <div id="dailyOptions" class="form-group" style="display: none;">
      <label for="dailyLimit">Daily Limit (visits)</label>
      <input type="number" id="dailyLimit" min="1" value="3">
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="enabled" checked class="checkbox"> Enabled
      </label>
    </div>

    <button id="addBtn">Add Rule</button>

    <div class="rules-list" id="rulesList"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
