<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Site Blocker</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #2a2a2a; color: #f8f8f8; }
    .shell { width: min(800px, 100%); display: grid; gap: 24px; }
    .panel { background: #333333; border-radius: 12px; overflow: hidden; }
    header { padding: 24px; background: #404040; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: #cccccc; font-size: 0.9rem; line-height: 1.4; }
    .body { padding: 24px; display: grid; gap: 20px; }
    .field-grid { display: grid; gap: 16px; }
    .form-row { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    .form-group { display: grid; gap: 6px; }
    label { color: #cccccc; font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select { width: 100%; border: 1px solid #555555; border-radius: 6px; background: #2a2a2a; color: #f8f8f8; padding: 12px; font-size: 1rem; outline: none; }
    input:focus, select:focus { border-color: #777777; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    button { border: none; border-radius: 6px; padding: 12px 20px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s ease; }
    button.primary { background: #555555; color: #f8f8f8; }
    button.primary:hover { background: #666666; }
    button.secondary { background: #404040; color: #f8f8f8; }
    button.secondary:hover { background: #4a4a4a; }
    .rules-list { display: grid; gap: 8px; margin-top: 8px; }
    .rule-item { padding: 16px; background: #404040; border-radius: 8px; display: grid; gap: 8px; }
    .rule-pattern { color: #f8f8f8; font-size: 1rem; font-weight: 600; }
    .rule-detail { color: #cccccc; font-size: 0.9rem; }
    .rule-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-small { border: 1px solid #555555; background: #333333; color: #f8f8f8; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; }
    .btn-small:hover { background: #404040; }
    .btn-delete { background: #662222; border-color: #883333; color: #f8f8f8; }
    .btn-delete:hover { background: #883333; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .captcha-modal { width: min(96vw, 720px); max-height: 90vh; background: #181818; border-radius: 18px; overflow: hidden; display: grid; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
    .captcha-header { padding: 22px; background: #111; }
    .captcha-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .captcha-subtitle { color: #c6c6c6; font-size: 0.95rem; line-height: 1.4; }
    .captcha-body { padding: 20px; display: grid; gap: 16px; overflow: auto; }
    .captcha-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .captcha-tile { position: relative; border: 2px solid transparent; border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
    .captcha-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .captcha-tile.selected { border-color: #3fcf8e; box-shadow: 0 0 0 4px rgba(63, 207, 142, 0.18); transform: scale(1.02); }
    .captcha-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-end; }
    .captcha-error { color: #ff7a7a; min-height: 1.25rem; font-size: 0.95rem; }
    @media (max-width: 680px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header>
        <h1>Simple Site Blocker</h1>
      </header>
        <p class="subtitle">Create and manage smart blocking rules on a dedicated settings screen, with a clean, modern interface designed for productivity.</p>
      <div class="body">
        <div class="field-grid">
          <div class="form-group">
            <label for="pattern">Website pattern</label>
            <input type="text" id="pattern" placeholder="e.g. *reddit.com*, *twitter.com*" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="blockType">Block type</label>
            <select id="blockType">
              <option value="time">Time-based</option>
              <option value="daily">Visit limit</option>
              <option value="duration">Time limit</option>
            </select>
          </div>
          <div id="timeOptions" class="form-row">
            <div class="form-group">
              <label for="startTime">Start</label>
              <input type="time" id="startTime" value="09:00">
            </div>
            <div class="form-group">
              <label for="endTime">End</label>
              <input type="time" id="endTime" value="17:00">
            </div>
          </div>
          <div id="visitOptions" class="form-group" style="display:none;">
            <label for="dailyLimit">Daily visit limit</label>
            <input type="number" id="dailyLimit" min="1" value="3">
          </div>
          <div id="durationOptions" class="form-group" style="display:none;">
            <label for="dailyTimeLimit">Daily time limit</label>
            <div class="form-row">
              <div class="form-group">
                <label for="hours">Hours</label>
                <input type="number" id="hours" min="0" value="1">
              </div>
              <div class="form-group">
                <label for="minutes">Minutes</label>
                <input type="number" id="minutes" min="0" max="59" value="0">
              </div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="addBtn" class="primary">Add rule</button>
          <button type="button" class="secondary" id="refreshBtn">Refresh</button>
        </div>

        <div class="rules-list" id="rulesList"></div>
      </div>
    </section>
  </main>

  <div id="captchaOverlay" class="modal-overlay" aria-hidden="true">
    <div class="captcha-modal" role="dialog" aria-modal="true" aria-labelledby="captchaTitle">
      <div class="captcha-header">
        <div id="captchaTitle" class="captcha-title">Confirm action</div>
        <div class="captcha-subtitle">Select every image that contains a chihuahua to proceed with disabling or deleting the rule.</div>
      </div>
      <div class="captcha-body">
        <div class="captcha-grid" id="captchaGrid"></div>
        <div class="captcha-error" id="captchaError"></div>
        <div class="captcha-actions">
          <button id="captchaCancel" class="btn-small secondary" type="button">Cancel</button>
          <button id="captchaConfirm" class="btn-small primary" type="button">Verify and continue</button>
        </div>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
