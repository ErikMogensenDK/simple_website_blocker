<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Site Blocker</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .shell { width: min(980px, 100%); display: grid; gap: 24px; }
    .panel { background: #111827; border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 28px; box-shadow: 0 24px 80px rgba(15, 23, 42, 0.4); overflow: hidden; }
    header { padding: 32px; background: linear-gradient(180deg, rgba(30, 58, 138, 0.95), rgba(15, 23, 42, 0.95)); }
    h1 { font-size: clamp(1.9rem, 2.5vw, 2.7rem); line-height: 1.05; letter-spacing: -0.04em; }
    .subtitle { margin-top: 10px; color: #cbd5e1; max-width: 42rem; font-size: 0.98rem; }
    .body { padding: 28px 32px 32px; display: grid; gap: 20px; }
    .field-grid { display: grid; gap: 18px; }
    .form-row { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    .form-group { display: grid; gap: 8px; }
    label { color: #94a3b8; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; }
    input, select { width: 100%; border: none; border-radius: 14px; background: #0f172a; color: #e2e8f0; padding: 14px 16px; font-size: 1rem; outline: none; box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12); transition: box-shadow 0.2s ease, transform 0.2s ease; }
    input:focus, select:focus { box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.55); transform: translateY(-1px); }
    .checkbox-group { display: flex; align-items: center; gap: 10px; color: #e2e8f0; }
    .checkbox-group input { width: 18px; height: 18px; accent-color: #3b82f6; margin: 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    button { border: none; border-radius: 14px; padding: 14px 22px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.16s ease, background 0.2s ease; }
    button.primary { background: #2563eb; color: #fff; box-shadow: 0 18px 40px rgba(37, 99, 235, 0.24); }
    button.primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    button.secondary { background: #1f2937; color: #e2e8f0; }
    .rules-list { display: grid; gap: 12px; margin-top: 8px; }
    .rule-item { padding: 18px 20px; background: #111827; border: 1px solid rgba(148, 163, 184, 0.08); border-radius: 18px; display: grid; gap: 10px; }
    .rule-pattern { color: #fff; font-size: 1rem; font-weight: 700; word-break: break-word; }
    .rule-detail { color: #94a3b8; font-size: 0.92rem; }
    .rule-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn-small { border: 1px solid transparent; background: rgba(255, 255, 255, 0.06); color: #e2e8f0; padding: 10px 14px; border-radius: 12px; font-size: 0.92rem; transition: background 0.2s ease; }
    .btn-small:hover { background: rgba(255, 255, 255, 0.12); }
    .btn-delete { background: #dc2626; border-color: rgba(220, 38, 38, 0.8); }
    .btn-delete:hover { background: #b91c1c; }
    @media (max-width: 680px) { .form-row { grid-template-columns: 1fr; } .panel { border-radius: 22px; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header>
        <h1>Simple Site Blocker</h1>
        <p class="subtitle">Create and manage smart blocking rules on a dedicated settings screen, with a clean, modern interface designed for productivity.</p>
      </header>
      <div class="body">
        <div class="field-grid">
          <div class="form-group">
            <label for="pattern">Website pattern</label>
            <input type="text" id="pattern" placeholder="e.g. *reddit.com*, *twitter.com*" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="blockType">Block type</label>
            <select id="blockType">
              <option value="time">Time-based</option>
              <option value="daily">Visit limit</option>
              <option value="duration">Time limit</option>
            </select>
          </div>
          <div id="timeOptions" class="form-row">
            <div class="form-group">
              <label for="startTime">Start</label>
              <input type="time" id="startTime" value="09:00">
            </div>
            <div class="form-group">
              <label for="endTime">End</label>
              <input type="time" id="endTime" value="17:00">
            </div>
          </div>
          <div id="visitOptions" class="form-group" style="display:none;">
            <label for="dailyLimit">Daily visit limit</label>
            <input type="number" id="dailyLimit" min="1" value="3">
          </div>
          <div id="durationOptions" class="form-group" style="display:none;">
            <label for="dailyTimeLimit">Daily time limit</label>
            <div class="form-row">
              <div class="form-group">
                <label for="hours">Hours</label>
                <input type="number" id="hours" min="0" value="1">
              </div>
              <div class="form-group">
                <label for="minutes">Minutes</label>
                <input type="number" id="minutes" min="0" max="59" value="0">
              </div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="addBtn" class="primary">Add rule</button>
          <button type="button" class="secondary" id="refreshBtn">Refresh</button>
        </div>

        <div class="rules-list" id="rulesList"></div>
      </div>
    </section>
  </main>

  <script src="settings.js"></script>
</body>
</html>
